        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

            background: rgba(9, 10, 15, 0.85);
            backdrop-filter: blur(16px);

        .toast-enter { animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translateY(0) scale(1); opacity: 1; }
            to { transform: translateY(15px) scale(0.9); opacity: 0; }
        }
        @keyframes fadeInScale {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

            transform: translateX(-100%);

        // Modern Clipboard API
        window.copySpecificText = async function(text) {

                } else {

                    textArea.value = text;

                    textArea.focus(); textArea.select();

        // 1. القاموس المحلي الأساسي
        function applyLocalDictionary(text) {
            let translated = text.trim().replace(/\s+/g, ' ');
            const normalizeText = (t) => t.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي');

            const keys = Object.keys(translationDict).sort((a, b) => b.length - a.length);
            
            keys.forEach(key => {
                let regexStr = key.split('').map(char => {
                    if (/[أإآا]/.test(char)) return '[أإآا]';
                    if (/[ةه]/.test(char)) return '[ةه]';
                    if (/[ىي]/.test(char)) return '[ىي]';
                    return char;
                }).join('');
                
                try {
                    translated = translated.replace(new RegExp(regexStr, 'gi'), translationDict[key]);
                } catch(e) {}
            });

            let words = translated.split(' ');
            let finalWords = words.map(word => {
                if (/^[a-zA-Z\s-]+$/.test(word)) return word; 
                let cleanWord = word.replace(/^(ال|بال|كال|فال|وال|لل|و)/, '');
                
                const checkDict = (w) => {
                    if (translationDict[w]) return translationDict[w];
                    let normW = normalizeText(w);
                    for (let k in translationDict) {
                        if (normalizeText(k) === normW) return translationDict[k];
                    }
                    return null;
                };
                return checkDict(word) || checkDict(cleanWord) || word;
            });

            return finalWords.join(' ');
        }

        // 2. مترجم جوجل المجاني للكلمات المتبقية (كما كان في النسخة الأولى بالضبط)
        async function translateTextWithAPI(text) {
            if (!translateToggle.checked) return text;
            
            let localTranslated = applyLocalDictionary(text);
            
            // إذا لم يتبق أي حروف عربية، أرجع النتيجة فوراً
            if (!/[\u0600-\u06FF]/.test(localTranslated)) { 
                return localTranslated; 
            }

            // إذا تبقت حروف عربية، استخدم مترجم جوجل المجاني
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const data = await response.json();
                let fullTranslation = '';
                if (data && data[0]) {
                    data[0].forEach(sentenceObj => { if (sentenceObj[0]) fullTranslation += sentenceObj[0]; });
                }
                return fullTranslation || localTranslated;
            } catch (error) {
                return localTranslated; // عند فشل الاتصال، استخدم القاموس المحلي
            }
        }

        function analyzeStrength() {
            const text = searchInput.value.trim();
            const words = text.split(/\s+/).filter(w => w.length > 0).length;
            const filtersCount = selectedFilters.size;
            
            let score = 0;
            if (words > 0) score += 20;
            if (words >= 3) score += 30;
            if (words >= 5) score += 10; 
            if (filtersCount > 0) score += 20;
            if (filtersCount >= 2) score += 20; 
            
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            
            bar.style.width = `${score}%`;
            if (score === 0) {
                bar.className = 'h-full w-0 transition-all duration-500 rounded-full'; txt.textContent = '-';
            } else if (score <= 30) {
                bar.className = 'h-full bg-red-500 transition-all duration-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.6)]'; txt.textContent = 'ضعيفة';
            } else if (score <= 60) {

            }
        }

                if(btn) toggleFilter(btn, f);
            });
            toggleClearBtn(); analyzeStrength(); toggleFavoritesModal(); showToast('تم الاسترجاع');
        }

        function deleteFavorite(id) {
            savedFavorites = savedFavorites.filter(f => f.id !== id);
            localStorage.setItem('pinterest_favorites', JSON.stringify(savedFavorites));
            updateFavCount(); renderFavorites();
        }

        window.exportFavorites = function() {
            if(savedFavorites.length === 0) { showToast('لا توجد بيانات للتصدير', 'error'); return; }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(savedFavorites));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "pinterest_pro_favorites.json");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast('تم التصدير بنجاح');
        };

        window.importFavorites = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        savedFavorites = imported;
                        localStorage.setItem('pinterest_favorites', JSON.stringify(savedFavorites));
                        updateFavCount(); renderFavorites(); showToast('تم الاستيراد بنجاح');
                    } else { throw new Error('Invalid format'); }
                } catch (err) { showToast('ملف غير صالح', 'error'); }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        };

        // --- GLOBAL TOAST ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-red-500/10 border-red-500/30 text-red-400';
            const icon = type === 'success' 
                ? '<svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>'
                : '<svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

            toast.className = `flex items-center gap-2 sm:gap-3 px-4 py-3 sm:px-6 sm:py-4 rounded-xl sm:rounded-full shadow-2xl border backdrop-blur-md ${colors} toast-enter font-bold w-[90vw] sm:w-auto max-w-md mx-auto sm:mr-0`;
            toast.innerHTML = `${icon} <span class="text-xs sm:text-sm">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Close modals on outside click
        window.onclick = function(event) {
            if (event.target === document.getElementById('favModal')) toggleFavoritesModal();
        }
    </script>
</body>
</html>
