<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        pinterest: {
                            DEFAULT: '#E60023',
                            hover: '#ad081b',
                            light: '#ffe5e5'
                        },
                        pro: {
                            DEFAULT: '#6366f1',
                            hover: '#4f46e5',
                            light: '#e0e7ff'
                        },
                        dark: {
                            bg: '#090a0f',      /* Very dark background */
                            card: '#15171e',    /* Slightly lighter dark for cards */
                            surface: '#1f222d'  /* For inputs and inner elements */
                        }
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #090a0f;
            color: #f3f4f6;
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #090a0f; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .glass-header {
            background: rgba(9, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        /* Animations */
        .toast-enter { animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast-leave { animation: fadeOut 0.3s ease-in forwards; }
        .modal-enter { animation: fadeInScale 0.3s ease-out forwards; }
        
        @keyframes slideInUp {
            from { transform: translateY(100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translateY(0) scale(1); opacity: 1; }
            to { transform: translateY(15px) scale(0.9); opacity: 0; }
        }
        @keyframes fadeInScale {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .peer:checked ~ .peer-checked\:after\:translate-x-full {
            transform: translateX(-100%);
        }
    </style>
</head>

                    </svg>
                    باحث الإلهام
                    <span class="bg-gradient-to-r from-orange-400 to-pink-500 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-wider font-bold mb-4 shadow-lg shadow-pink-500/30">PRO</span>
                </h1>
                <p class="text-gray-400 text-sm md:text-base flex items-center justify-center md:justify-start gap-1 font-medium">

                <span id="favCount" class="bg-yellow-500 text-black text-xs py-0.5 px-2 rounded-full font-black">0</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->

                </div>
                <!-- Rounded Pill Input -->
                <input type="text" id="searchInput" class="block w-full pr-16 pl-14 py-5 text-xl text-white border-2 border-transparent rounded-full bg-dark-surface focus:bg-dark-surface focus:ring-0 focus:border-pro transition-all duration-300 placeholder-gray-500 font-semibold shadow-inner" placeholder="اكتب فكرتك هنا (مثال: تصميم شعار مطعم)...">

                </button>

                            <input type="checkbox" id="translateToggle" class="sr-only peer" checked>
                            <div class="w-12 h-6 bg-gray-700 rounded-full peer peer-checked:after:-translate-x-6 peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gradient-to-r peer-checked:from-cyan-400 peer-checked:to-blue-500 shadow-inner"></div>

        function applyLocalDictionary(text) {
            let translated = text.trim().replace(/\s+/g, ' ');
            const normalizeText = (t) => t.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي');

            const keys = Object.keys(translationDict).sort((a, b) => b.length - a.length);
            
            keys.forEach(key => {
                let regexStr = key.split('').map(char => {
                    if (/[أإآا]/.test(char)) return '[أإآا]';
                    if (/[ةه]/.test(char)) return '[ةه]';
                    if (/[ىي]/.test(char)) return '[ىي]';
                    return char;
                }).join('');
                try {
                    translated = translated.replace(new RegExp(regexStr, 'gi'), translationDict[key]);
                } catch(e) {}
            });

            let words = translated.split(' ');
            let finalWords = words.map(word => {
                if (/^[a-zA-Z\s-]+$/.test(word)) return word;
                let cleanWord = word.replace(/^(ال|بال|كال|فال|وال|لل|و)/, '');
                
                const checkDict = (w) => {
                    if (translationDict[w]) return translationDict[w];
                    let normW = normalizeText(w);
                    for (let k in translationDict) {
                        if (normalizeText(k) === normW) return translationDict[k];
                    }
                    return null;
                };

                return checkDict(word) || checkDict(cleanWord) || word;
            });

            return finalWords.join(' ');
        }

        async function translateTextWithAPI(text) {
            if (!translateToggle.checked) return text;
            let localTranslated = applyLocalDictionary(text);
            if (!/[\u0600-\u06FF]/.test(localTranslated)) { return localTranslated; }

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=en&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const data = await response.json();
                let fullTranslation = '';
                if (data && data[0]) {
                    data[0].forEach(sentenceObj => { if (sentenceObj[0]) fullTranslation += sentenceObj[0]; });
                }
                return fullTranslation || localTranslated;
            } catch (error) {
                return localTranslated;
            }
        }

        function analyzeStrength() {
            const text = searchInput.value.trim();
            const words = text.split(/\s+/).filter(w => w.length > 0).length;
            const filtersCount = selectedFilters.size;
            
            let score = 0;
            if (words > 0) score += 20;
            if (words >= 3) score += 30;
            if (words >= 5) score += 10; 
            if (filtersCount > 0) score += 20;
            if (filtersCount >= 2) score += 20; 
            
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            
            bar.style.width = `${score}%`;
            
            if (score === 0) {
                bar.className = 'h-full w-0 transition-all duration-500 rounded-full';
                txt.textContent = '-';
            } else if (score <= 30) {
                bar.className = 'h-full bg-red-500 transition-all duration-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.6)]';
                txt.textContent = 'ضعيفة';
            } else if (score <= 60) {
                bar.className = 'h-full bg-yellow-400 transition-all duration-500 rounded-full shadow-[0_0_10px_rgba(250,204,21,0.6)]';
                txt.textContent = 'جيدة';

        }

                        red: 'bg-red-500/10 border-red-500/30 text-red-400',
                    };

                    const card = document.createElement('div');
                    card.className = 'bg-dark-surface p-6 rounded-[2rem] border border-gray-800 relative shadow-lg';
                    card.innerHTML = `
                        <span class="absolute top-5 left-5 text-[10px] font-black px-3 py-1 rounded-full border ${colorClasses[v.color]}">${v.badge}</span>
                        <h4 class="font-black text-white text-lg mb-1 pr-2">${v.title}</h4>
                        <p class="text-sm text-gray-400 mb-4 pr-2 font-medium">${v.desc}</p>
                        <div class="bg-[#090a0f] p-4 rounded-2xl border border-gray-800 font-mono text-sm text-gray-300 text-left mb-5 break-words" dir="ltr">
                            ${v.query}
                        </div>
                        <div class="flex gap-3">
                            <button onclick="copySpecificText('${v.query}')" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white px-4 py-3 rounded-full text-sm font-bold transition-colors flex justify-center items-center gap-2">
                                نسخ النص
                            </button>
                            <button onclick="window.open('https://www.pinterest.com/search/pins/?q=${encodeURIComponent(v.query)}', '_blank')" class="flex-1 bg-white hover:bg-gray-200 text-black px-4 py-3 rounded-full text-sm font-bold transition-colors flex justify-center items-center gap-2">
                                بحث فوراً
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('enhanceModal').classList.remove('hidden');
            } catch (err) {
                showToast('حدث خطأ أثناء التحسين', 'error');
            } finally {
                btn.innerHTML = originalHtml; btn.disabled = false;
            }
        };

        window.copySpecificText = function(text) {
            let textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            textArea.remove();
            showToast('تم النسخ 📋');
        };

        // Global Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-red-500/10 border-red-500/30 text-red-400';
            const icon = type === 'success' 
                ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>'
                : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';

            toast.className = `flex items-center gap-3 px-6 py-4 rounded-full shadow-2xl border backdrop-blur-md ${colors} toast-enter font-bold`;
            toast.innerHTML = `${icon} <span class="text-sm">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        window.onclick = function(event) {
            const favModal = document.getElementById('favModal');
            const enhanceModal = document.getElementById('enhanceModal');
            if (event.target === favModal) toggleFavoritesModal();
            if (event.target === enhanceModal) closeEnhanceModal();
        }
    </script>
</body>
</html>
